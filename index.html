<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Заводські блатні · сучасний фон</title>
  <style>
    /* ---------- Глобальне скидання ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #080e1a;
      overflow: hidden;
    }

    /* ===== СУЧАСНИЙ ТЕМНИЙ ДИНАМІЧНИЙ ФОН ===== */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      background: #080e1a;
      overflow: hidden;
    }

    .animated-bg .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.5;
      animation: floatOrb 25s infinite alternate ease-in-out;
    }

    .animated-bg .orb:nth-child(1) {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 150, 255, 0.25), rgba(0, 80, 200, 0.05));
      top: -10%;
      left: -10%;
      animation-duration: 28s;
    }

    .animated-bg .orb:nth-child(2) {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(100, 0, 255, 0.2), rgba(50, 0, 150, 0.05));
      bottom: -15%;
      right: -10%;
      animation-duration: 32s;
      animation-delay: -5s;
    }

    .animated-bg .orb:nth-child(3) {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0, 200, 255, 0.2), rgba(0, 100, 200, 0.05));
      top: 40%;
      left: 30%;
      animation-duration: 24s;
      animation-delay: -10s;
    }

    .animated-bg .orb:nth-child(4) {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(50, 100, 255, 0.2), rgba(20, 50, 150, 0.05));
      top: 15%;
      right: 20%;
      animation-duration: 20s;
      animation-delay: -3s;
    }

    .animated-bg .orb:nth-child(5) {
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(150, 50, 255, 0.15), rgba(80, 0, 200, 0.05));
      bottom: 20%;
      left: 15%;
      animation-duration: 30s;
      animation-delay: -8s;
    }

    .animated-bg .grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 150, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 150, 255, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 30s linear infinite;
    }

    @keyframes floatOrb {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      25% {
        transform: translate(80px, -60px) scale(1.1) rotate(5deg);
      }
      50% {
        transform: translate(-40px, 80px) scale(0.9) rotate(-3deg);
      }
      75% {
        transform: translate(60px, 40px) scale(1.05) rotate(7deg);
      }
      100% {
        transform: translate(-30px, -40px) scale(0.95) rotate(-5deg);
      }
    }

    @keyframes gridMove {
      0% {
        transform: translate(0, 0);
      }
      100% {
        transform: translate(60px, 60px);
      }
    }

    /* ===== ГОЛОВНА СТОРІНКА (ЧІТКЕ ФОТО) ===== */
    .hero-fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1000;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.7s ease, transform 0.7s ease;
      pointer-events: all;
    }

    .hero-fullscreen.hidden {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .hero-fullscreen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      filter: none; /* Чітке фото без розмиття */
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      text-align: center;
      backdrop-filter: none; /* Прибираємо розмиття */
      -webkit-backdrop-filter: none;
    }

    .hero-overlay h1 {
      font-size: clamp(2rem, 10vw, 5.5rem);
      font-weight: 800;
      color: #fff;
      text-shadow: 0 4px 40px rgba(0, 0, 0, 0.6);
      letter-spacing: 2px;
      margin-bottom: 30px;
      padding: 0 10px;
      word-break: break-word;
    }

    .hero-overlay .btn-primary {
      padding: 16px 40px;
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: 600;
      color: #fff;
      background: #0096ff;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 8px 30px rgba(0, 150, 255, 0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
      touch-action: manipulation;
      min-height: 56px;
      width: auto;
      min-width: 200px;
      position: relative;
      z-index: 2;
    }

    .hero-overlay .btn-primary:hover {
      background: #2aaaff;
      transform: scale(1.04);
      box-shadow: 0 12px 40px rgba(0, 150, 255, 0.6);
    }

    .hero-overlay .btn-primary:active {
      transform: scale(0.96);
    }

    /* ===== ОСНОВНИЙ ІНТЕРФЕЙС ===== */
    .app-full {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.6s ease 0.3s;
    }

    .app-full.visible {
      opacity: 1;
    }

    /* ===== БІЧНА ПАНЕЛЬ (скляний ефект) ===== */
    .sidebar {
      flex: 0 0 280px;
      height: 100vh;
      background: rgba(11, 25, 41, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(0, 150, 255, 0.12);
      color: #eaf1fd;
      padding: 30px 16px 20px 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 30px rgba(0, 0, 0, 0.4);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      z-index: 10;
      flex-shrink: 0;
    }

    .sidebar .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .sidebar .logo span {
      background: #0096ff;
      padding: 0 12px 3px 12px;
      border-radius: 60px;
      font-size: 18px;
      color: white;
      line-height: 1.4;
      box-shadow: 0 0 20px rgba(0, 150, 255, 0.3);
    }

    .categories {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 4px;
    }

    .category-btn {
      background: transparent;
      border: none;
      border-radius: 60px;
      padding: 14px 18px;
      font-size: 17px;
      font-weight: 500;
      text-align: left;
      color: #c4d4ee;
      cursor: pointer;
      transition: 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid transparent;
      letter-spacing: 0.2px;
      touch-action: manipulation;
      min-height: 48px;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    .category-btn i {
      font-size: 20px;
      width: 28px;
      display: inline-block;
      color: #5f84c4;
      transition: 0.2s;
      flex-shrink: 0;
    }

    .category-btn:active {
      transform: scale(0.97);
    }

    .category-btn.active {
      background: rgba(0, 150, 255, 0.2);
      color: white;
      border-color: rgba(0, 150, 255, 0.5);
      box-shadow: 0 0 25px rgba(0, 150, 255, 0.1), inset 0 0 20px rgba(0, 150, 255, 0.05);
    }

    .category-btn.active i {
      color: #66bbff;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 20px;
      font-size: 12px;
      opacity: 0.35;
      border-top: 1px solid rgba(0, 150, 255, 0.12);
      color: #b6cbe5;
    }

    /* ===== ОСНОВНА ЧАСТИНА ===== */
    .main {
      flex: 1;
      height: 100vh;
      background: rgba(242, 246, 254, 0.06);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 24px 28px 24px 28px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      min-width: 0;
    }

    .main-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(0, 150, 255, 0.12);
    }

    .main-header h2 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
      letter-spacing: -0.5px;
      word-break: break-word;
    }

    .main-header .badge {
      background: rgba(0, 150, 255, 0.15);
      backdrop-filter: blur(10px);
      color: #aad4ff;
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
      border: 1px solid rgba(0, 150, 255, 0.15);
    }

    .content-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 28px 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ===== СТИЛІ ДЛЯ КОНТЕНТУ ===== */
    .content-box h3 {
      font-size: 28px;
      font-weight: 600;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .content-box h3 i {
      color: #66bbff;
      text-shadow: 0 0 20px rgba(0, 150, 255, 0.3);
    }

    .content-box p {
      font-size: 17px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.85);
      max-width: 780px;
      text-shadow: 0 1px 10px rgba(0,0,0,0.1);
    }

    /* ===== ГОЛУБА НЕОНОВА ГАЛЕРЕЯ ===== */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 20px;
      width: 100%;
      flex: 1;
    }

    .gallery-item {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(10, 22, 40, 0.6);
      backdrop-filter: blur(4px);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.4s ease;
      box-shadow: 
        0 0 12px rgba(0, 150, 255, 0.25),
        0 0 25px rgba(0, 150, 255, 0.1),
        inset 0 0 20px rgba(0, 150, 255, 0.05);
      border: 2px solid rgba(0, 150, 255, 0.3);
      width: 100%;
      height: 100%;
      min-height: 200px;
    }

    .gallery-item::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 22px;
      background: transparent;
      z-index: 0;
      box-shadow: 
        0 0 20px rgba(0, 150, 255, 0.15),
        0 0 50px rgba(0, 150, 255, 0.08),
        0 0 100px rgba(0, 150, 255, 0.04);
      opacity: 0.7;
      transition: 0.5s ease;
    }

    .gallery-item:hover::before {
      opacity: 1;
      box-shadow: 
        0 0 30px rgba(0, 150, 255, 0.4),
        0 0 70px rgba(0, 150, 255, 0.25),
        0 0 120px rgba(0, 150, 255, 0.12);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: 0.4s ease;
      position: relative;
      z-index: 1;
      border-radius: 18px;
    }

    .gallery-item:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 
        0 0 25px rgba(0, 150, 255, 0.5),
        0 0 50px rgba(0, 150, 255, 0.3),
        0 0 100px rgba(0, 150, 255, 0.15),
        inset 0 0 30px rgba(0, 150, 255, 0.1);
      border-color: rgba(0, 180, 255, 0.7);
    }

    .gallery-item:hover img {
      transform: scale(1.03);
    }

    /* ===== ІНШІ СТИЛІ ДЛЯ КОНТЕНТУ ===== */
    .content-box .highlight {
      background: rgba(0, 150, 255, 0.1);
      backdrop-filter: blur(8px);
      padding: 16px 22px;
      border-radius: 20px;
      color: #cce6ff;
      border-left: 6px solid #0096ff;
      font-weight: 500;
      margin: 12px 0 18px 0;
      font-size: 16px;
      box-shadow: 0 0 30px rgba(0, 150, 255, 0.05);
    }

    .grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-top: 12px;
    }

    .grid-cards .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      padding: 18px 16px;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      font-size: 15px;
      transition: 0.3s ease;
    }

    .grid-cards .card i {
      margin-right: 10px;
      color: #66bbff;
    }

    .grid-cards .card:hover {
      background: rgba(0, 150, 255, 0.08);
      border-color: rgba(0, 150, 255, 0.15);
      transform: translateY(-2px);
    }

    /* ===== МОБІЛЬНА АДАПТАЦІЯ ===== */
    @media (max-width: 820px) {
      .app-full {
        flex-direction: column;
        overflow-y: auto;
      }

      .sidebar {
        flex: 0 0 auto;
        width: 100%;
        height: auto;
        min-height: auto;
        padding: 16px 16px 12px 20px;
        backdrop-filter: blur(20px);
        border-right: none;
        border-bottom: 1px solid rgba(0, 150, 255, 0.12);
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        overflow-y: visible;
      }

      .sidebar .logo {
        margin-bottom: 0;
        flex: 1;
        font-size: 20px;
        min-width: 140px;
      }

      .sidebar .logo span {
        font-size: 16px;
      }

      .sidebar-footer {
        display: none;
      }

      .categories {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 4px;
        width: 100%;
        margin-top: 4px;
        padding-top: 8px;
        border-top: 1px solid rgba(0, 150, 255, 0.12);
      }

      .category-btn {
        padding: 10px 16px;
        font-size: 15px;
        min-height: 40px;
        flex: 1 0 auto;
        width: auto;
        justify-content: center;
        min-width: 80px;
      }

      .category-btn i {
        font-size: 17px;
        width: 24px;
      }

      .main {
        padding: 16px 16px 20px 16px;
        height: auto;
        min-height: 60vh;
        overflow-y: visible;
        backdrop-filter: blur(4px);
      }

      .main-header h2 {
        font-size: 22px;
      }

      .main-header .badge {
        font-size: 12px;
        padding: 4px 14px;
      }

      .content-box {
        padding: 20px 18px;
        border-radius: 20px;
        min-height: 200px;
        backdrop-filter: blur(8px);
      }

      .content-box h3 {
        font-size: 22px;
      }

      .content-box p {
        font-size: 16px;
      }

      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        flex: 1;
      }

      .gallery-item {
        min-height: 150px;
      }

      .grid-cards {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .grid-cards .card {
        padding: 14px 12px;
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .hero-overlay h1 {
        font-size: 1.8rem;
        margin-bottom: 20px;
      }

      .hero-overlay .btn-primary {
        padding: 14px 28px;
        font-size: 0.95rem;
        min-width: 160px;
        min-height: 48px;
      }

      .sidebar .logo {
        font-size: 17px;
        min-width: 100px;
      }

      .sidebar .logo span {
        font-size: 14px;
        padding: 0 10px 2px 10px;
      }

      .category-btn {
        font-size: 13px;
        padding: 8px 12px;
        min-height: 34px;
        min-width: 60px;
        gap: 4px;
      }

      .category-btn i {
        font-size: 14px;
        width: 20px;
      }

      .main-header h2 {
        font-size: 18px;
      }

      .main-header .badge {
        font-size: 10px;
        padding: 3px 10px;
      }

      .content-box {
        padding: 16px 14px;
        border-radius: 16px;
      }

      .content-box h3 {
        font-size: 18px;
      }

      .content-box p {
        font-size: 14px;
        line-height: 1.6;
      }

      .gallery-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        flex: 1;
      }

      .gallery-item {
        border-radius: 14px;
        aspect-ratio: 1 / 1;
        border-width: 1.5px;
        min-height: 120px;
      }

      .gallery-item::before {
        border-radius: 16px;
        inset: -3px;
      }

      .grid-cards {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .grid-cards .card {
        padding: 12px 10px;
        font-size: 12px;
        border-radius: 14px;
      }
    }

    @media (max-width: 380px) {
      .category-btn {
        font-size: 11px;
        padding: 6px 8px;
        min-height: 30px;
        min-width: 50px;
      }

      .category-btn i {
        font-size: 12px;
        width: 16px;
      }

      .sidebar .logo {
        font-size: 15px;
        min-width: 80px;
      }

      .gallery-grid {
        gap: 8px;
      }

      .grid-cards {
        grid-template-columns: 1fr 1fr;
      }

      .grid-cards .card {
        font-size: 11px;
        padding: 10px 8px;
      }

      .content-box h3 {
        font-size: 16px;
      }

      .content-box p {
        font-size: 13px;
      }
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 150, 255, 0.3);
      border-radius: 20px;
    }

    input, button, textarea {
      -webkit-appearance: none;
      appearance: none;
    }
  </style>
</head>
<body>

  <!-- ===== СУЧАСНИЙ ТЕМНИЙ ФОН ===== -->
  <div class="animated-bg">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- ===== ГОЛОВНА СТОРІНКА (ЧІТКЕ ФОТО) ===== -->
  <div class="hero-fullscreen" id="heroScreen">
    <img src="https://i.imgur.com/Fvu6Ecj.jpeg" alt="Заводські блатні" />
    <div class="hero-overlay">
      <h1>Заводські блатні</h1>
      <button class="btn-primary" id="enterBtn">Перейти далі →</button>
    </div>
  </div>

  <!-- ===== ОСНОВНИЙ ІНТЕРФЕЙС ===== -->
  <div class="app-full" id="appInterface">

    <!-- БІЧНА ПАНЕЛЬ -->
    <aside class="sidebar">
      <div class="logo">
        <span>Заводські блатні</span>
      </div>

      <nav class="categories">
        <button class="category-btn active" data-category="home">
          <i>🏠</i> База
        </button>
        <button class="category-btn" data-category="1">
          <i>⛰️</i> Гори
        </button>
        <button class="category-btn" data-category="2">
          <i>🌄</i> Випускний 2026
        </button>
      </nav>

      <div class="sidebar-footer">
        <span>компанія · 2026</span>
      </div>
    </aside>

    <!-- ОСНОВНА ЧАСТИНА -->
    <main class="main">
      <div class="main-header">
        <h2 id="categoryTitle">🏠 База Заводських</h2>
        <span class="badge" id="categoryBadge">Заводські блатні</span>
      </div>

      <div class="content-box" id="contentDisplay">
        <div id="homeContent">
          <h3><i>🏭</i> Заводські блатні</h3>

      const titleEl = document.getElementById('categoryTitle');
      const badgeEl = document.getElementById('categoryBadge');
      const contentDisplay = document.getElementById('contentDisplay');

      function switchCategory(categoryId) {
        const data = contentMap[categoryId];
        if (!data) return;

        titleEl.textContent = data.title;
        badgeEl.textContent = data.badge;
        contentDisplay.innerHTML = data.html;

        categoryBtns.forEach(btn => {
          const btnCat = btn.getAttribute('data-category');
          if (btnCat === categoryId.toString()) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });
      }

      categoryBtns.forEach(btn => {
        btn.addEventListener('click', function(e) {
          const cat = this.getAttribute('data-category');
          if (cat) switchCategory(cat);
        });
      });

      const homeBtn = document.querySelector('[data-category="home"]');
      if (homeBtn) {
        homeBtn.classList.add('active');
        switchCategory('home');
      } else {
        const first = document.querySelector('.category-btn');
        if (first) {
          first.classList.add('active');
          const firstCat = first.getAttribute('data-category');
          if (firstCat) switchCategory(firstCat);
        }
      }
    })();
  </script>
